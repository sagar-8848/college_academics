<!doctype html>
<html>
  <head>
    <title>Edit Student</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <h2>Edit Student</h2>

      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label>Full Name</label>
          <input
            type="text"
            name="full_name"
            class="form-control"
            value="{{ student.full_name }}"
          />
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input
            type="email"
            name="email"
            class="form-control"
            value="{{ student.email }}"
          />
        </div>

        <div class="mb-3">
          <label>Phone</label>
          <input
            type="text"
            name="phone"
            class="form-control"
            value="{{ student.phone }}"
          />
        </div>

        <button class="btn btn-primary">Update Student</button>
      </form>
    </div>
  </body>
</html>
