{% extends "base.html" %} {% block content %}

<h2>Edit Course</h2>

<form method="POST">
  {% csrf_token %}

  <div class="mb-3">
    <label>Course Name</label>

    <input
      type="text"
      name="course_name"
      class="form-control"
      value="{{ course.course_name }}"
    />
  </div>

  <div class="mb-3">
    <label>Duration</label>

    <input
      type="text"
      name="duration"
      class="form-control"
      value="{{ course.duration }}"
    />
  </div>

  <button class="btn btn-primary">Update Course</button>
</form>

{% endblock %}
